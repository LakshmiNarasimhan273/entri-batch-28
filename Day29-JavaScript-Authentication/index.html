<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Entri - Login</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f9;
        }

        .card{
            width: 350px;
        }
    </style>
</head>
<body>

    <div class="card shadow">
        <div class="card-body">
            <h4 class="text-center mb-4">Login</h4>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" id="loginEmail">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" id="loginPassword">
                </div>
                <!-- <p class="text-secondary text-sm">Forgot Password</p> -->
                <button class="btn btn-success w-100">Login</button>

                <p class="text-center mt-3">Don't have an account <a href="signup.html">Register</a></p>
            </form>
        </div>
    </div>
    

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
